<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김민수 | 자기소개</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        color: #111827;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 760px);
        background: rgba(255,255,255,0.95);
        border: 1px solid #e5e7eb;
        border-radius: 28px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        padding: 2.5rem;
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 2.1rem;
        letter-spacing: -0.02em;
        color: #1f2937;
      }
      .subtitle {
        margin: 0 0 1.2rem;
        font-size: 1rem;
        color: #4b5563;
        line-height: 1.8;
      }
      .section {
        margin-top: 1.1rem;
      }
      .label {
        display: inline-block;
        margin: 0.3rem 0.35rem 0.3rem 0;
        padding: 0.45rem 0.8rem;
        background: #ede9fe;
        color: #5b21b6;
        border-radius: 999px;
        font-size: 0.95rem;
      }
      .quote {
        margin-top: 1.25rem;
        padding: 1rem 1.15rem;
        background: #f9fafb;
        border-left: 4px solid #7c3aed;
        color: #374151;
        line-height: 1.7;
      }
      .small {
        margin-top: 1rem;
        font-size: 0.95rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>안녕하세요, 김민수입니다.</h1>
      <p class="subtitle">꾸준히 배우고, 기록하며, 사용자에게 더 나은 경험을 만드는 개발자입니다.</p>

      <div class="section">
        <span class="label">웹 개발</span>
        <span class="label">UI/UX</span>
        <span class="label">GitHub</span>
        <span class="label">꾸준한 성장</span>
      </div>

      <div class="quote">
        “기술은 도구이고, 중요한 건 사람과 경험을 더 자연스럽게 연결하는 일입니다.”
      </div>

      <p class="small">이 사이트는 GitHub Pages로 배포된 텍스트 기반 자기소개 페이지입니다.</p>
    </main>
  </body>
</html>

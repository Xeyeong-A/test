<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김민수 | 자기소개</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f5f7fb;
        color: #111827;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(92vw, 760px);
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        padding: 2.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        letter-spacing: -0.02em;
      }
      .subtitle {
        margin: 0 0 1.25rem;
        font-size: 1rem;
        color: #4b5563;
        line-height: 1.7;
      }
      .section {
        margin-top: 1.25rem;
      }
      .label {
        display: inline-block;
        margin: 0.3rem 0.35rem 0.3rem 0;
        padding: 0.45rem 0.8rem;
        background: #eef2ff;
        color: #3730a3;
        border-radius: 999px;
        font-size: 0.95rem;
      }
      .quote {
        margin-top: 1.25rem;
        padding: 1rem 1.15rem;
        background: #f9fafb;
        border-left: 4px solid #6366f1;
        color: #374151;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>안녕하세요, 김민수입니다.</h1>
      <p class="subtitle">사용자 중심의 웹 경험을 만드는 개발자입니다. 늘 배우고, 기록하고, 함께 성장하는 것을 좋아합니다.</p>

      <div class="section">
        <span class="label">웹 개발</span>
        <span class="label">UI/UX</span>
        <span class="label">GitHub</span>
        <span class="label">성장 중</span>
      </div>

      <div class="quote">
        “좋은 서비스는 단순한 기능보다, 사람에게 자연스럽게 다가가는 경험에서 시작됩니다.”
      </div>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김민수 | 자기소개</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #f8fafc;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(15, 23, 42, 0.85);
        padding: 2rem 2.5rem;
        border-radius: 20px;
        box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        max-width: 640px;
        text-align: center;
      }
      h1 { margin-bottom: 0.5rem; }
      p { line-height: 1.7; }
      .pill { display: inline-block; margin: 0.3rem; padding: 0.45rem 0.8rem; border-radius: 999px; background: #2563eb; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>안녕하세요, 김민수입니다.</h1>
      <p>웹 개발과 사용자 경험을 사랑하는 개발자입니다. 꾸준히 배우고, 문제를 해결하며, 함께 성장하는 환경을 중요하게 생각합니다.</p>
      <div>
        <span class="pill">Frontend</span>
        <span class="pill">React</span>
        <span class="pill">GitHub</span>
        <span class="pill">Learning</span>
      </div>
    </main>
  </body>
</html>
